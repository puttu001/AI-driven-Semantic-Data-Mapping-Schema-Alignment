<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI semantic Data Mapping Intelligence Platform</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./styles/starter.css">
</head>
<body>
	<div class="page-shell">
		<main class="starter-card card" id="starterCard">
			<form id="starterForm" novalidate>
				<div class="top-row">
					<div class="title-block">
						<h1>AI semantic Data Mapping Intelligence Platform</h1>
						<p>
							Upload your CDM and application mapping files to launch the semantic mapping process.
						</p>
					</div>

					<div class="demo-download-block">
						<label for="demoDownloadSelect">Download demo files</label>
						<div class="download-control">
							<select id="demoDownloadSelect" aria-label="Download demo dropdown">
								<option value="">download demo dropdown</option>
								<option value="cdm">Download demo CDM file</option>
								<option value="mapping">Download demo mapping file</option>
								<option value="both">Download both demo files</option>
							</select>
							<button type="button" id="demoDownloadButton">Download</button>
						</div>
					</div>
				</div>

				<div class="upload-row">
					<label class="upload-box" for="cdmFile" data-input="cdmFile">
						<input id="cdmFile" name="cdm_file" type="file" accept=".csv">
						<span class="upload-icon" aria-hidden="true">
							<svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
								<path d="M12 45.5V52h40v-6.5" />
								<path d="M32 44V18" />
								<path d="M23 27l9-9 9 9" />
							</svg>
						</span>
						<span class="upload-title">CDM glossary file</span>
						<span class="upload-subtitle" id="cdmFileLabel">Drop CSV file here or click to upload</span>
					</label>

					<label class="upload-box" for="mappingFile" data-input="mappingFile">
						<input id="mappingFile" name="mapping_file" type="file" accept=".csv">
						<span class="upload-icon" aria-hidden="true">
							<svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
								<path d="M12 45.5V52h40v-6.5" />
								<path d="M32 44V18" />
								<path d="M23 27l9-9 9 9" />
							</svg>
						</span>
						<span class="upload-title">Application mapping file</span>
						<span class="upload-subtitle" id="mappingFileLabel">Drop CSV file here or click to upload</span>
					</label>
				</div>

				<label class="demo-checkbox-row" for="demoModeCheckbox">
					<input id="demoModeCheckbox" type="checkbox">
					<span>Use demo input files</span>
				</label>

				<button type="submit" id="runProcessButton" class="run-button" disabled>
					Submit
				</button>

				<p class="status-message" id="statusMessage" role="status" aria-live="polite"></p>
			</form>
		</main>
	</div>

	<script type="module" src="./scripts/starter.js"></script>
</body>
</html>
